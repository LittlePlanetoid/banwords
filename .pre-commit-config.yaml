repos:

  - repo: local
    hooks:
      - id: ruff-check
        name: ruff-check
        entry: uv run ruff
        language: system
        types: [python]
        args: ["check"]

  - repo: local
    hooks:
      - id: ruff-format
        name: ruff-format
        entry: uv run ruff
        language: system
        types: [python]
        args: ["format", "--diff"]

  - repo: local
    hooks:
      - id: py-markdownlint
        name: py-markdownlint
        entry: uv run pymarkdownlnt
        language: system
        types: [markdown]
        args: ["."]